<!-- FUNDO PREMIUM OTIMIZADO -->
<style>
body{
    margin:0;
    padding:0;
    background:
        radial-gradient(circle at top,
        rgba(180,0,0,0.18) 0%,
        rgba(0,0,0,0) 40%),
        linear-gradient(to bottom,
        #070707 0%,
        #050505 100%);
    font-family: Arial, sans-serif;
    color:white;
    overflow-x:hidden;
}

/* GLOW SUAVE */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at center,
        rgba(255,0,0,0.08),
        transparent 60%);
    pointer-events:none;
    z-index:-1;
}

/* CONTAINER */
.main-card{
    width:88%;
    max-width:420px;
    margin:40px auto;
    padding:28px;
    border-radius:32px;

    background:linear-gradient(
        to bottom,
        rgba(20,20,20,0.96),
        rgba(8,8,8,0.98)
    );

    border:1px solid rgba(255,0,0,0.12);

    box-shadow:
        0 0 30px rgba(255,0,0,0.10),
        0 0 80px rgba(120,0,0,0.08);
}

/* LOGO */
.logo-area{
    text-align:center;
    margin-bottom:22px;
}

.logo-box{
    width:60px;
    height:60px;
    margin:auto;
    border-radius:18px;

    background:linear-gradient(
        135deg,
        #ff1a1a,
        #7a0000
    );

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:28px;
    font-weight:bold;

    box-shadow:
        0 0 25px rgba(255,0,0,0.35);
}

.logo-title{
    margin-top:16px;
    font-size:32px;
    font-weight:900;
    letter-spacing:10px;
}

/* BADGE */
.beta-badge{
    display:inline-block;
    margin-top:18px;
    padding:10px 22px;

    border-radius:50px;

    background:rgba(120,0,0,0.25);

    border:1px solid rgba(255,0,0,0.20);

    color:#ff4d4d;

    font-size:13px;
    font-weight:bold;
    letter-spacing:5px;
}

/* TITULO */
.hero-title{
    text-align:center;
    font-size:56px;
    line-height:0.95;
    font-weight:900;

    margin-top:38px;
    margin-bottom:26px;
}

.hero-sub{
    text-align:center;
    color:#c8c8c8;
    font-size:21px;
    line-height:1.8;

    margin-bottom:45px;
}

/* CARDS */
.info-card{
    background:linear-gradient(
        to bottom,
        rgba(30,0,0,0.45),
        rgba(12,12,12,0.92)
    );

    border:1px solid rgba(255,0,0,0.10);

    border-radius:24px;

    padding:26px;
    margin-bottom:24px;

    box-shadow:
        0 0 25px rgba(255,0,0,0.05);
}

.card-title{
    color:#ff4d4d;
    font-size:14px;
    font-weight:bold;
    letter-spacing:5px;

    margin-bottom:20px;
}

.card-text{
    color:#ededed;
    font-size:18px;
    line-height:1.8;
}

/* GRID */
.stats-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
    margin-bottom:28px;
}

.small-card{
    background:rgba(18,18,18,0.95);

    border-radius:22px;

    border:1px solid rgba(255,255,255,0.06);

    padding:22px;
}

.small-label{
    color:#ff4d4d;
    font-size:12px;
    letter-spacing:4px;
    margin-bottom:12px;
}

.small-value{
    font-size:18px;
    font-weight:bold;
}

/* LISTA */
.update-list{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.update-item{
    display:flex;
    align-items:center;
    gap:14px;

    color:#ededed;
    font-size:18px;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#ff1a1a;

    box-shadow:0 0 10px red;
}

/* BOTAO */
.download-btn{
    width:100%;
    border:none;

    padding:24px;

    border-radius:24px;

    background:linear-gradient(
        to bottom,
        #ff1f1f,
        #b80000
    );

    color:white;

    font-size:22px;
    font-weight:900;
    letter-spacing:4px;

    margin-top:30px;

    box-shadow:
        0 0 35px rgba(255,0,0,0.35);

    transition:0.2s;
}

.download-btn:active{
    transform:scale(0.98);
}

/* WHATS */
.whats-btn{
    width:100%;

    padding:22px;

    margin-top:18px;

    border-radius:24px;

    border:1px solid rgba(255,255,255,0.08);

    background:rgba(18,18,18,0.96);

    color:white;

    font-size:20px;
    font-weight:bold;
}

/* FOOTER */
.footer{
    text-align:center;
    margin-top:45px;

    color:#9f9f9f;

    font-size:16px;
    line-height:1.8;
}

/* MOBILE */
@media(max-width:600px){

    .main-card{
        width:90%;
        padding:22px;
    }

    .hero-title{
        font-size:42px;
    }

    .hero-sub{
        font-size:18px;
    }

    .stats-grid{
        grid-template-columns:1fr;
    }

    .download-btn{
        font-size:19px;
        letter-spacing:2px;
    }

}
</style>
